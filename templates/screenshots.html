<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vulnerability Screenshots</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>📸 Screenshots for Scan: {{ scan_id }}</h1>

    <div class="gallery">
        {% for img in images %}
            <div class="card">
                <img src="/{{ img }}" alt="Screenshot">
            </div>
        {% endfor %}
        {% if images|length == 0 %}
            <p>No screenshots found for this scan.</p>
        {% endif %}
    </div>

    <a href="/" class="btn">⬅ Back to Home</a>
</div>
</body>
</html>
